<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coding Agent</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        user-select: none;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(
            circle at 50% 0%,
            rgba(84, 122, 255, 0.2) 0%,
            transparent 60%
          ),
          linear-gradient(180deg, #10131a 0%, #0a0c11 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #f4f7fb;
      }
      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
      }
      .logo {
        width: 68px;
        height: 68px;
        border-radius: 18px;
        background: linear-gradient(135deg, #547aff 0%, #7b5ea7 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 34px;
        font-weight: 700;
        color: #fff;
        letter-spacing: -1px;
        box-shadow: 0 8px 32px rgba(84, 122, 255, 0.4);
      }
      h1 {
        font-size: 20px;
        font-weight: 600;
        color: #f4f7fb;
        letter-spacing: -0.3px;
      }
      .spinner {
        width: 26px;
        height: 26px;
        border: 2.5px solid rgba(84, 122, 255, 0.2);
        border-top-color: #547aff;
        border-radius: 50%;
        animation: spin 0.75s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .status {
        font-size: 12px;
        color: rgba(244, 247, 251, 0.45);
        letter-spacing: 0.2px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">R</div>
      <h1>Coding Agent</h1>
      <div class="spinner"></div>
      <p class="status">Starting server…</p>
    </div>
  </body>
</html>
