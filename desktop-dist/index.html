<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Rovix</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(84, 122, 255, 0.22), transparent 35%),
          linear-gradient(180deg, #10131a 0%, #0a0c11 100%);
        color: #f4f7fb;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(640px, calc(100vw - 48px));
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        padding: 32px;
        background: rgba(12, 15, 22, 0.78);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      p {
        margin: 0;
        color: rgba(244, 247, 251, 0.74);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Rovix Desktop Shell</h1>
      <p>
        The Tauri shell is configured for development via
        <code>bun run desktop:dev</code>. Production packaging still needs a
        bundled Next.js sidecar strategy.
      </p>
    </main>
  </body>
</html>
